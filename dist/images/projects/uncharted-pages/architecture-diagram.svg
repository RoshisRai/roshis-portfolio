<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <linearGradient id="grad-frontend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4eff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6b4eff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-backend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-database" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
