    <text x="744" y="270" font-size="8" fill="#fbcfe8">Particles.js</text>
    <text x="905" y="270" text-anchor="end" font-size="8" fill="#8888a0">ambient effects</text>
    <rect x="736" y="284" width="178" height="22" rx="5" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.22" stroke-width="1"/>
    <text x="744" y="298" font-size="8" fill="#fbcfe8">Scene transitions</text>
    <text x="905" y="298" text-anchor="end" font-size="8" fill="#8888a0">page flows</text>
