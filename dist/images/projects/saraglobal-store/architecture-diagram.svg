    <rect x="44" y="292" width="48" height="17" rx="4" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="68" y="304" text-anchor="middle" font-size="8" fill="#fbcfe8">CSS</text>
    <rect x="100" y="292" width="48" height="17" rx="4" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="124" y="304" text-anchor="middle" font-size="8" fill="#fbcfe8">JS/jQuery</text>
    <rect x="156" y="292" width="48" height="17" rx="4" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="180" y="304" text-anchor="middle" font-size="8" fill="#fbcfe8">UI</text>
