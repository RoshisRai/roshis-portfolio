    <rect x="726" y="256" width="188" height="22" rx="5" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.22" stroke-width="1"/>
    <text x="734" y="270" font-size="8" fill="#6ee7b7">products/</text>
    <text x="902" y="270" text-anchor="end" font-size="8" fill="#8888a0">images</text>
    <rect x="726" y="284" width="188" height="22" rx="5" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.22" stroke-width="1"/>
    <text x="734" y="298" font-size="8" fill="#6ee7b7">banners/</text>
    <text x="902" y="298" text-anchor="end" font-size="8" fill="#8888a0">promos</text>
    <rect x="726" y="312" width="188" height="22" rx="5" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.22" stroke-width="1"/>
    <text x="734" y="326" font-size="8" fill="#6ee7b7">slides/</text>
    <text x="902" y="326" text-anchor="end" font-size="8" fill="#8888a0">hero content</text>
    <rect x="726" y="340" width="188" height="22" rx="5" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.22" stroke-width="1"/>
