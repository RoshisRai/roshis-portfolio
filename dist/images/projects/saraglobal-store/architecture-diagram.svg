    <text x="175" y="392" text-anchor="middle" font-size="8.5" fill="#facc15" letter-spacing="2">EMAILS</text>
    <text x="175" y="412" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Notifications</text>
    <text x="175" y="430" text-anchor="middle" font-size="8" fill="#8888a0">Order confirmations · Status updates</text>

    <rect x="78" y="442" width="194" height="20" rx="6" fill="#facc15" fill-opacity="0.1" stroke="#facc15" stroke-opacity="0.25" stroke-width="1"/>
    <text x="175" y="456" text-anchor="middle" font-size="8" fill="#fef08a">Template rendering</text>
    <rect x="78" y="468" width="194" height="20" rx="6" fill="#facc15" fill-opacity="0.1" stroke="#facc15" stroke-opacity="0.25" stroke-width="1"/>
    <text x="175" y="482" text-anchor="middle" font-size="8" fill="#fef08a">SMTP delivery</text>
