    <rect x="566" y="260" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="609" y="272" text-anchor="middle" font-size="8" fill="#bfdbfe">users</text>
    <rect x="474" y="282" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="517" y="294" text-anchor="middle" font-size="8" fill="#bfdbfe">reviews</text>
    <rect x="566" y="282" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="609" y="294" text-anchor="middle" font-size="8" fill="#bfdbfe">home</text>

    <rect x="460" y="310" width="210" height="58" rx="10" fill="#60a5fa" fill-opacity="0.08" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="565" y="330" text-anchor="middle" font-size="8" fill="#60a5fa" letter-spacing="1">ADMIN &amp; CONTROL</text>
