    <text x="120" y="120" text-anchor="middle" font-size="8.5" fill="#f472b6" letter-spacing="2">CLIENT</text>
    <text x="120" y="138" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Customer Browser</text>
    <text x="120" y="152" text-anchor="middle" font-size="8" fill="#8888a0">Browse · Cart · Checkout</text>

    <rect x="30" y="200" width="210" height="120" rx="10" fill="url(#grad-frontend)" stroke="#f472b6" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="135" y="221" text-anchor="middle" font-size="8.5" fill="#f472b6" letter-spacing="2">TEMPLATES</text>
    <text x="135" y="239" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Django Templates</text>

