    <text x="565" y="419" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">SQLite / PostgreSQL</text>
    <text x="565" y="437" text-anchor="middle" font-size="8" fill="#8888a0">Orders · Products · Users · Reviews</text>
    <rect x="480" y="444" width="80" height="18" rx="4" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="520" y="456" text-anchor="middle" font-size="8" fill="#a5f3fc">Dev: SQLite</text>
    <rect x="570" y="444" width="80" height="18" rx="4" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="610" y="456" text-anchor="middle" font-size="8" fill="#a5f3fc">Prod: Postgres</text>
  </g>

