  <text x="480" y="56" text-anchor="middle" font-size="19" fill="#e8e8ed" font-weight="700">Sara Global Store E-commerce Suite</text>
  <text x="480" y="74" text-anchor="middle" font-size="10" fill="#8888a0">Django 3.2.5 · HTML/CSS/JS · SQLite/Postgres · Pillow · Email</text>

  <line x1="120" y1="150" x2="120" y2="200" stroke="#f472b6" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-fe)"/>
