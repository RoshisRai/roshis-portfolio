    <text x="565" y="230" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Django Apps</text>
    <rect x="474" y="238" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="517" y="250" text-anchor="middle" font-size="8" fill="#bfdbfe">products</text>
    <rect x="566" y="238" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="609" y="250" text-anchor="middle" font-size="8" fill="#bfdbfe">cart</text>
    <rect x="474" y="260" width="86" height="18" rx="4" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
