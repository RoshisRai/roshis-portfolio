<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 590" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <linearGradient id="grad-frontend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-backend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-database" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-media" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-email" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0.05"/>
    </linearGradient>

    <marker id="arr-fe" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f472b6" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-be" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#60a5fa" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-db" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22d3ee" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-med" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#34d399" fill-opacity="0.7"/>
