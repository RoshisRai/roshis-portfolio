<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1118"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <linearGradient id="grad-input" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-processing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grad-output" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aede7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3aede7" stop-opacity="0.05"/>
    </linearGradient>

    <marker id="arr-in" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22d3ee" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-proc" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#38bdf8" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-ai" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#a78bfa" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-out" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3aede7" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="140" x2="960" y2="140"/>
    <line x1="0" y1="280" x2="960" y2="280"/>
    <line x1="0" y1="420" x2="960" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="560"/>
    <line x1="480" y1="0" x2="480" y2="560"/>
    <line x1="720" y1="0" x2="720" y2="560"/>
  </g>

  <text x="480" y="34" text-anchor="middle" font-size="10" fill="#8888a0" letter-spacing="3">EVENT-DRIVEN ARCHITECTURE</text>
  <text x="480" y="56" text-anchor="middle" font-size="19" fill="#e8e8ed" font-weight="700">EveryLinguaAI Voice System</text>
  <text x="480" y="74" text-anchor="middle" font-size="10" fill="#8888a0">Wake Word · ASR · Translation · GPT · TTS · Audio Output</text>

  <line x1="210" y1="212" x2="260" y2="212" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-in)"/>
  <line x1="450" y1="212" x2="500" y2="212" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-proc)"/>
  <line x1="690" y1="212" x2="740" y2="212" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-ai)"/>

  <line x1="340" y1="305" x2="340" y2="350" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-proc)"/>
  <line x1="580" y1="305" x2="580" y2="350" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-ai)"/>
  <line x1="820" y1="305" x2="820" y2="350" stroke="#3aede7" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-out)"/>

  <g data-layer="input">
    <rect x="40" y="120" width="190" height="110" rx="12" fill="url(#grad-input)" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="135" y="142" text-anchor="middle" font-size="8.5" fill="#22d3ee" letter-spacing="2">INPUT</text>
    <text x="135" y="162" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Wake Word + Mic</text>
    <text x="135" y="178" text-anchor="middle" font-size="8" fill="#94a3b8">Noise gate · VAD · Audio capture</text>
    <rect x="60" y="190" width="150" height="20" rx="6" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="135" y="204" text-anchor="middle" font-size="8" fill="#a5f3fc">Streaming audio frames</text>
  </g>

  <g data-layer="processing">
    <rect x="270" y="120" width="190" height="110" rx="12" fill="url(#grad-processing)" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="365" y="142" text-anchor="middle" font-size="8.5" fill="#38bdf8" letter-spacing="2">PROCESSING</text>
    <text x="365" y="162" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">ASR + Translation</text>
    <text x="365" y="178" text-anchor="middle" font-size="8" fill="#94a3b8">Language detect · Normalization</text>
    <rect x="290" y="190" width="150" height="20" rx="6" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="365" y="204" text-anchor="middle" font-size="8" fill="#bae6fd">Transcribed text</text>

    <rect x="250" y="350" width="230" height="140" rx="14" fill="url(#grad-processing)" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="365" y="374" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="2">VOICE PIPELINE</text>
    <text x="365" y="396" text-anchor="middle" font-size="11.5" fill="#e8e8ed" font-weight="600">Audio Stack</text>
    <text x="365" y="414" text-anchor="middle" font-size="8" fill="#94a3b8">Mic calibration · Chunking · Buffering</text>
    <rect x="270" y="428" width="190" height="20" rx="6" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
    <text x="365" y="442" text-anchor="middle" font-size="8" fill="#bae6fd">Speech frames</text>
  </g>

  <g data-layer="ai-engine">
    <rect x="500" y="120" width="190" height="110" rx="12" fill="url(#grad-ai)" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="595" y="142" text-anchor="middle" font-size="8.5" fill="#a78bfa" letter-spacing="2">AI ENGINE</text>
    <text x="595" y="162" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">GPT + Orchestrator</text>
    <text x="595" y="178" text-anchor="middle" font-size="8" fill="#c4b5fd">Context · Tools · Intent routing</text>
    <rect x="520" y="190" width="150" height="20" rx="6" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="595" y="204" text-anchor="middle" font-size="8" fill="#ddd6fe">Response plan</text>

    <rect x="490" y="350" width="230" height="140" rx="14" fill="url(#grad-ai)" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="605" y="374" text-anchor="middle" font-size="9" fill="#a78bfa" letter-spacing="2">CONTEXT CORE</text>
    <text x="605" y="396" text-anchor="middle" font-size="11.5" fill="#e8e8ed" font-weight="600">Conversation State</text>
    <text x="605" y="414" text-anchor="middle" font-size="8" fill="#c4b5fd">Memory · Translation state · Locale</text>
    <rect x="510" y="428" width="190" height="20" rx="6" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="605" y="442" text-anchor="middle" font-size="8" fill="#ddd6fe">Prompt assembly</text>
  </g>

  <g data-layer="output">
    <rect x="730" y="120" width="190" height="110" rx="12" fill="url(#grad-output)" stroke="#3aede7" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="825" y="142" text-anchor="middle" font-size="8.5" fill="#3aede7" letter-spacing="2">OUTPUT</text>
    <text x="825" y="162" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">TTS + Playback</text>
    <text x="825" y="178" text-anchor="middle" font-size="8" fill="#94a3b8">Voice rendering · Speaker out</text>
    <rect x="750" y="190" width="150" height="20" rx="6" fill="#3aede7" fill-opacity="0.1" stroke="#3aede7" stroke-opacity="0.25" stroke-width="1"/>
    <text x="825" y="204" text-anchor="middle" font-size="8" fill="#99f6e4">Spoken response</text>
    
    <rect x="730" y="350" width="190" height="140" rx="14" fill="url(#grad-output)" stroke="#3aede7" stroke-opacity="0.35" stroke-width="1.2"/>
    <text x="825" y="374" text-anchor="middle" font-size="9" fill="#3aede7" letter-spacing="2">AUDIO OUTPUT</text>
    <text x="825" y="396" text-anchor="middle" font-size="11.5" fill="#e8e8ed" font-weight="600">Voice Renderer</text>
    <text x="825" y="414" text-anchor="middle" font-size="8" fill="#94a3b8">Streaming · Cache · Playback</text>
    <rect x="750" y="428" width="150" height="20" rx="6" fill="#3aede7" fill-opacity="0.1" stroke="#3aede7" stroke-opacity="0.25" stroke-width="1"/>
    <text x="825" y="442" text-anchor="middle" font-size="8" fill="#99f6e4">Audio buffer</text>
  </g>
</svg>
