<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>

    <!-- Layer gradients -->
    <linearGradient id="grad-api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grad-automation" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grad-database" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="grad-security" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arr-api" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-auto" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-db" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#06b6d4" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-sec" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#10b981" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-both-l" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,3 L7,0 L7,6 z" fill="#8b5cf6" fill-opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="145" x2="960" y2="145"/>
    <line x1="0" y1="290" x2="960" y2="290"/>
    <line x1="0" y1="435" x2="960" y2="435"/>
    <line x1="240" y1="0" x2="240" y2="580"/>
    <line x1="480" y1="0" x2="480" y2="580"/>
    <line x1="720" y1="0" x2="720" y2="580"/>
  </g>

  <!-- Header -->
  <text x="480" y="34" text-anchor="middle" font-size="10" fill="#8888a0" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <text x="480" y="56" text-anchor="middle" font-size="19" fill="#e8e8ed" font-weight="700" letter-spacing="0.3">Subscription Management Platform</text>
  <text x="480" y="74" text-anchor="middle" font-size="10" fill="#8888a0">Node.js · Express · MongoDB · Upstash QStash · Arcjet</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOW LINES (drawn first, sit behind all layer groups)  -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Client → Security boundary (entry) -->
  <line x1="90" y1="152" x2="90" y2="188" stroke="#10b981" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-sec)"/>

  <!-- Security → API Gateway -->
  <line x1="90" y1="248" x2="90" y2="292" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-api)"/>

  <!-- API Gateway → Controllers -->
  <line x1="196" y1="330" x2="258" y2="330" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-api)"/>

  <!-- Controllers → Services -->
  <line x1="196" y1="350" x2="258" y2="380" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-api)"/>

  <!-- Services → QStash Workflow (automation) -->
  <line x1="430" y1="340" x2="492" y2="300" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-auto)"/>

  <!-- QStash → Email -->
  <line x1="630" y1="300" x2="695" y2="280" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-auto)"/>

  <!-- Services → MongoDB -->
  <line x1="340" y1="430" x2="340" y2="460" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-db)"/>

  <!-- Services → Redis -->
  <line x1="280" y1="430" x2="195" y2="462" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-db)"/>

  <!-- QStash bidirectional state -->
  <line x1="560" y1="330" x2="560" y2="462" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-auto)"/>

  <!-- ═══════════════════════ -->
  <!-- LAYER: security         -->
  <!-- ═══════════════════════ -->
  <g data-layer="security">

    <!-- Security perimeter label -->
    <rect x="20" y="182" width="202" height="72" rx="10" fill="url(#grad-security)" stroke="#10b981" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="121" y="203" text-anchor="middle" font-size="8.5" fill="#10b981" letter-spacing="2">SECURITY PERIMETER</text>
    <text x="121" y="221" text-anchor="middle" font-size="11.5" fill="#e8e8ed" font-weight="600">Arcjet Shield</text>
    <rect x="36" y="229" width="80" height="17" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
    <text x="76" y="241" text-anchor="middle" font-size="8" fill="#6ee7b7">Rate Limit</text>
    <rect x="124" y="229" width="80" height="17" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
    <text x="164" y="241" text-anchor="middle" font-size="8" fill="#6ee7b7">Bot Detection</text>

    <!-- Client box -->
    <rect x="20" y="98" width="140" height="54" rx="10" fill="url(#grad-security)" stroke="#10b981" stroke-opacity="0.35" stroke-width="1"/>
    <text x="90" y="118" text-anchor="middle" font-size="8.5" fill="#10b981" letter-spacing="2">CLIENT</text>
    <text x="90" y="136" text-anchor="middle" font-size="12" fill="#e8e8ed" font-weight="600">Browser / App</text>
    <text x="90" y="149" text-anchor="middle" font-size="8" fill="#8888a0">HTTPS · TLS/SSL</text>

    <!-- RBAC chip (sits between security and api, cosmetic) -->
    <rect x="170" y="98" width="52" height="54" rx="10" fill="url(#grad-security)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="196" y="122" text-anchor="middle" font-size="8" fill="#10b981" letter-spacing="1">RBAC</text>
    <text x="196" y="137" text-anchor="middle" font-size="8.5" fill="#6ee7b7" font-weight="600">4 Roles</text>
    <text x="196" y="149" text-anchor="middle" font-size="7.5" fill="#8888a0">admin</text>

  </g>

  <!-- ═══════════════════════ -->
  <!-- LAYER: api              -->
  <!-- ═══════════════════════ -->
  <g data-layer="api">

    <!-- API Gateway / Middleware stack -->
    <rect x="20" y="292" width="202" height="130" rx="10" fill="url(#grad-api)" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="121" y="313" text-anchor="middle" font-size="8.5" fill="#6366f1" letter-spacing="2">API GATEWAY</text>
    <text x="121" y="331" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Express.js</text>

    <rect x="34" y="338" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="74" y="350" text-anchor="middle" font-size="8" fill="#a5b4fc">JWT Auth</text>
    <rect x="122" y="338" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="162" y="350" text-anchor="middle" font-size="8" fill="#a5b4fc">Validation</text>

    <rect x="34" y="361" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="74" y="373" text-anchor="middle" font-size="8" fill="#a5b4fc">CORS</text>
    <rect x="122" y="361" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="162" y="373" text-anchor="middle" font-size="8" fill="#a5b4fc">Morgan Log</text>

    <rect x="34" y="384" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="74" y="396" text-anchor="middle" font-size="8" fill="#a5b4fc">Error Handler</text>
    <rect x="122" y="384" width="80" height="17" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
    <text x="162" y="396" text-anchor="middle" font-size="8" fill="#a5b4fc">Pagination</text>

    <!-- Controllers box -->
    <rect x="258" y="292" width="172" height="60" rx="10" fill="url(#grad-api)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="344" y="313" text-anchor="middle" font-size="8.5" fill="#6366f1" letter-spacing="2">CONTROLLERS</text>
    <text x="344" y="332" text-anchor="middle" font-size="11" fill="#e8e8ed" font-weight="600">Auth · Users · Subscriptions</text>
    <text x="344" y="346" text-anchor="middle" font-size="8" fill="#8888a0">Workflows · Utilities</text>

    <!-- Services box -->
    <rect x="258" y="362" width="172" height="60" rx="10" fill="url(#grad-api)" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="344" y="383" text-anchor="middle" font-size="8.5" fill="#6366f1" letter-spacing="2">SERVICES</text>
    <text x="344" y="402" text-anchor="middle" font-size="11" fill="#e8e8ed" font-weight="600">Business Logic</text>
    <text x="344" y="416" text-anchor="middle" font-size="8" fill="#8888a0">Lifecycle · Trial · Audit Log</text>

    <!-- Vertical connector controllers → services -->
    <line x1="344" y1="352" x2="344" y2="362" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 2"/>

    <!-- Webhook handler -->
    <rect x="258" y="188" width="172" height="80" rx="10" fill="url(#grad-api)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="344" y="210" text-anchor="middle" font-size="8.5" fill="#6366f1" letter-spacing="2">INBOUND WEBHOOKS</text>
    <text x="344" y="229" text-anchor="middle" font-size="12" fill="#e8e8ed" font-weight="600">Signature Verify</text>
    <text x="344" y="247" text-anchor="middle" font-size="8" fill="#8888a0">QStash signing keys</text>
    <text x="344" y="261" text-anchor="middle" font-size="8" fill="#8888a0">QSTASH_CURRENT · NEXT</text>

    <!-- Webhook → controllers line -->
    <line x1="344" y1="268" x2="344" y2="292" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 2"/>

  </g>

  <!-- ═══════════════════════ -->
  <!-- LAYER: automation       -->
  <!-- ═══════════════════════ -->
  <g data-layer="automation">

    <!-- QStash Workflow Engine -->
    <rect x="492" y="240" width="172" height="90" rx="10" fill="url(#grad-automation)" stroke="#8b5cf6" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="578" y="261" text-anchor="middle" font-size="8.5" fill="#8b5cf6" letter-spacing="2">WORKFLOW ENGINE</text>
    <text x="578" y="280" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Upstash QStash</text>
    <rect x="508" y="288" width="72" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
    <text x="544" y="300" text-anchor="middle" font-size="8" fill="#c4b5fd">Durable Jobs</text>
    <rect x="588" y="288" width="62" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
    <text x="619" y="300" text-anchor="middle" font-size="8" fill="#c4b5fd">State Persist</text>
    <text x="578" y="323" text-anchor="middle" font-size="8" fill="#8888a0">Error recovery · Retry logic</text>

    <!-- Reminder workflow stages -->
    <rect x="492" y="345" width="172" height="90" rx="10" fill="url(#grad-automation)" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="578" y="366" text-anchor="middle" font-size="8.5" fill="#8b5cf6" letter-spacing="2">REMINDER SEQUENCE</text>
    <rect x="504" y="373" width="28" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="518" y="385" text-anchor="middle" font-size="8" fill="#c4b5fd">7d</text>
    <rect x="538" y="373" width="28" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="552" y="385" text-anchor="middle" font-size="8" fill="#c4b5fd">5d</text>
    <rect x="572" y="373" width="28" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="586" y="385" text-anchor="middle" font-size="8" fill="#c4b5fd">2d</text>
    <rect x="606" y="373" width="28" height="17" rx="4" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="620" y="385" text-anchor="middle" font-size="8" fill="#c4b5fd">1d</text>
    <text x="578" y="407" text-anchor="middle" font-size="8" fill="#8888a0">Before renewal · Auto-reschedule</text>
    <text x="578" y="422" text-anchor="middle" font-size="8" fill="#8888a0">Cursor-based pagination</text>

    <!-- QStash → Reminder connector -->
    <line x1="578" y1="330" x2="578" y2="345" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="3 2"/>

    <!-- Nodemailer box -->
    <rect x="700" y="240" width="148" height="70" rx="10" fill="url(#grad-automation)" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="774" y="261" text-anchor="middle" font-size="8.5" fill="#8b5cf6" letter-spacing="2">EMAIL SERVICE</text>
    <text x="774" y="280" text-anchor="middle" font-size="12" fill="#e8e8ed" font-weight="600">Nodemailer</text>
    <text x="774" y="298" text-anchor="middle" font-size="8" fill="#8888a0">SMTP · App passwords</text>
    <text x="774" y="310" text-anchor="middle" font-size="8" fill="#8888a0">Verify · Reminder · Alerts</text>

    <!-- Admin workflow mgmt box -->
    <rect x="700" y="325" width="148" height="80" rx="10" fill="url(#grad-automation)" stroke="#8b5cf6" stroke-opacity="0.28" stroke-width="1"/>
    <text x="774" y="346" text-anchor="middle" font-size="8.5" fill="#8b5cf6" letter-spacing="2">ADMIN UTILITIES</text>
    <text x="774" y="365" text-anchor="middle" font-size="11" fill="#e8e8ed" font-weight="600">Workflow Monitor</text>
    <text x="774" y="382" text-anchor="middle" font-size="8" fill="#8888a0">List active workflows</text>
    <text x="774" y="396" text-anchor="middle" font-size="8" fill="#8888a0">Fix orphaned · Cancel</text>

    <!-- Nodemailer → Admin connector (cosmetic) -->
    <line x1="774" y1="310" x2="774" y2="325" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 2"/>

    <!-- QStash ↔ Admin -->
    <line x1="664" y1="370" x2="700" y2="365" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 2"/>

  </g>

  <!-- ═══════════════════════ -->
  <!-- LAYER: database          -->
  <!-- ═══════════════════════ -->
  <g data-layer="database">

    <!-- MongoDB -->
    <rect x="258" y="460" width="172" height="90" rx="10" fill="url(#grad-database)" stroke="#06b6d4" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="344" y="481" text-anchor="middle" font-size="8.5" fill="#06b6d4" letter-spacing="2">PRIMARY STORE</text>
    <text x="344" y="500" text-anchor="middle" font-size="13" fill="#e8e8ed" font-weight="600">MongoDB</text>
    <rect x="270" y="508" width="52" height="17" rx="4" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <text x="296" y="520" text-anchor="middle" font-size="8" fill="#67e8f9">Users</text>
    <rect x="328" y="508" width="52" height="17" rx="4" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <text x="354" y="520" text-anchor="middle" font-size="8" fill="#67e8f9">Subscriptions</text>
    <text x="344" y="543" text-anchor="middle" font-size="8" fill="#8888a0">Mongoose ODM · Global pagination</text>

    <!-- Redis -->
    <rect x="68" y="460" width="172" height="90" rx="10" fill="url(#grad-database)" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1"/>
    <text x="154" y="481" text-anchor="middle" font-size="8.5" fill="#06b6d4" letter-spacing="2">CACHE · SESSIONS</text>
    <text x="154" y="500" text-anchor="middle" font-size="13" fill="#e8e8ed" font-weight="600">Redis</text>
    <rect x="80" y="508" width="62" height="17" rx="4" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <text x="111" y="520" text-anchor="middle" font-size="8" fill="#67e8f9">Sessions</text>
    <rect x="150" y="508" width="78" height="17" rx="4" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <text x="189" y="520" text-anchor="middle" font-size="8" fill="#67e8f9">Queue backing</text>
    <text x="154" y="543" text-anchor="middle" font-size="8" fill="#8888a0">Rate limit counters · Bull/BullMQ</text>

    <!-- QStash state store -->
    <rect x="448" y="460" width="172" height="90" rx="10" fill="url(#grad-database)" stroke="#06b6d4" stroke-opacity="0.28" stroke-width="1"/>
    <text x="534" y="481" text-anchor="middle" font-size="8.5" fill="#06b6d4" letter-spacing="2">EVENT STORE</text>
    <text x="534" y="500" text-anchor="middle" font-size="12.5" fill="#e8e8ed" font-weight="600">Audit Log</text>
    <text x="534" y="517" text-anchor="middle" font-size="8" fill="#8888a0">Subscription changes</text>
    <text x="534" y="531" text-anchor="middle" font-size="8" fill="#8888a0">Billing events · Status transitions</text>
    <text x="534" y="545" text-anchor="middle" font-size="8" fill="#8888a0">Workflow IDs · Cursor pagination</text>

    <!-- horizontal connector redis ↔ mongo -->
    <line x1="240" y1="505" x2="258" y2="505" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 2"/>
    <!-- horizontal connector mongo ↔ audit -->
    <line x1="430" y1="505" x2="448" y2="505" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 2"/>

  </g>

  <!-- Legend -->
  <g font-size="8.5" letter-spacing="0.5">
    <circle cx="28" cy="566" r="4" fill="#6366f1" fill-opacity="0.8"/>
    <text x="38" y="570" fill="#8888a0">API</text>
    <circle cx="80" cy="566" r="4" fill="#8b5cf6" fill-opacity="0.8"/>
    <text x="90" y="570" fill="#8888a0">AUTOMATION</text>
    <circle cx="170" cy="566" r="4" fill="#06b6d4" fill-opacity="0.8"/>
    <text x="180" y="570" fill="#8888a0">DATABASE</text>
    <circle cx="255" cy="566" r="4" fill="#10b981" fill-opacity="0.8"/>
    <text x="265" y="570" fill="#8888a0">SECURITY</text>
    <text x="940" y="570" text-anchor="end" fill="#2a2a35" font-size="8">subscription-system · v1.0.0</text>
  </g>
</svg>
